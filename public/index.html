<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>فارز IC</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --glass: rgba(255,255,255,0.04);
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d0d1a 0%, #12121f 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    font-size: 20px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .header-count {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--muted);
  }

  .header-count span {
    color: var(--accent);
    font-weight: 700;
  }

  /* Main */
  .main { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* Camera Section */
  .camera-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
  }

  .camera-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas { display: none; }

  /* Overlay */
  .cam-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Target frame */
  .target-frame {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 65%;
    aspect-ratio: 1.2;
    border: 2px solid rgba(0,212,255,0.6);
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
  }

  .target-frame::before, .target-frame::after,
  .target-frame .c1, .target-frame .c2 {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--accent);
    border-style: solid;
  }
  .target-frame::before { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
  .target-frame::after  { top: -2px; left: -2px;  border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
  .target-frame .c1     { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }
  .target-frame .c2     { bottom: -2px; left: -2px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }

  /* Scan line */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 2s linear infinite;
    opacity: 0;
  }
  .scanning .scan-line { opacity: 1; }
  @keyframes scan {
    0% { top: 20%; }
    100% { top: 80%; }
  }

  /* Quality indicators */
  .quality-bar {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    padding: 10px 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .q-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
  }

  .q-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    transition: all 0.3s;
  }

  .q-dot.good { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  .q-dot.warn { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; }
  .q-dot.bad  { background: #ff4455; }

  /* Progress ring */
  .auto-capture-ring {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 48px;
    height: 48px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .auto-capture-ring.visible { opacity: 1; }

  .ring-svg circle {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 126;
    stroke-dashoffset: 126;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 0.1s;
  }

  .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
  }

  /* Camera controls */
  .cam-controls {
    padding: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-capture {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-capture:active { transform: scale(0.97); opacity: 0.9; }
  .btn-capture:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-upload {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    padding: 13px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  /* Manual input */
  .manual-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 16px;
  }

  .manual-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .manual-input-row {
    display: flex;
    gap: 8px;
  }

  .manual-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    direction: ltr;
    text-align: left;
    outline: none;
  }

  .manual-input:focus { border-color: var(--accent); }

  .btn-search {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #000;
    font-weight: 700;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
  }

  /* Result card */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    display: none;
  }

  .result-card.show { display: block; animation: slideUp 0.3s ease; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .result-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .result-body {
    padding: 24px 16px;
    text-align: center;
    position: relative;
  }

  /* Type badge */
  .type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .type-badge.normal {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
  }

  .type-badge.glass {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--accent2);
  }

  /* Storage display */
  .storage-display {
    margin: 8px 0;
  }

  .storage-number {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -3px;
  }

  .storage-unit {
    font-size: 28px;
    font-weight: 700;
    color: var(--muted);
    margin-right: 4px;
  }

  .ram-bga {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
  }

  .info-chip {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .info-chip strong { color: var(--text); }

  /* Detected code */
  .detected-code {
    margin-top: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 13px;
    color: #00ff88;
    direction: ltr;
    text-align: left;
    word-break: break-all;
  }

  /* Action buttons */
  .result-actions {
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
  }

  .btn-copy {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-copy:active { background: rgba(0,212,255,0.1); border-color: var(--accent); }

  .btn-next {
    flex: 1;
    background: linear-gradient(135deg, var(--accent2), #ff3366);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-next:active { transform: scale(0.97); }

  /* Loading state */
  .loading-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    text-align: center;
    display: none;
  }
  .loading-card.show { display: block; }

  .loader {
    width: 48px;
    height: 48px;
    border: 3px solid var(--glass);
    border-radius: 50%;
    display: inline-block;
    position: relative;
    border-right-color: var(--accent);
    animation: rotation 1s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Utilities */
  .hidden { display: none; }
</style>
</head>
<body>

  <header class="header">
    <div class="header-logo">فارز IC</div>
    <div class="header-count">الجلسة: <span id="sessionCount">0</span> قطعة</div>
  </header>

  <main class="main">
    
    <!-- Camera Section -->
    <section class="camera-section">
      <div class="camera-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="cam-overlay">
          <div class="target-frame">
            <div class="c1"></div><div class="c2"></div>
            <div class="scan-line"></div>
          </div>
          
          <div class="auto-capture-ring" id="captureRing">
            <svg class="ring-svg" viewBox="0 0 48 48">
              <circle cx="24" cy="24" r="20" id="ringProgress"></circle>
            </svg>
            <div class="ring-text" id="ringText">0%</div>
          </div>

          <div class="quality-bar">
            <div class="q-item"><div class="q-dot" id="dotFocus"></div> حدة</div>
            <div class="q-item"><div class="q-dot" id="dotLight"></div> إضاءة</div>
            <div class="q-item"><div class="q-dot" id="dotStable"></div> ثبات</div>
          </div>
        </div>
      </div>

      <div class="cam-controls">
        <button class="btn-capture" id="btnCapture">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          التقاط صورة
        </button>
        <label class="btn-upload">
          <input type="file" id="fileInput" accept="image/*" class="hidden">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          ملف
        </label>
      </div>
    </section>

    <!-- Manual Input -->
    <section class="manual-section">
      <div class="manual-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        إدخال الكود يدوياً
      </div>
      <div class="manual-input-row">
        <input type="text" id="manualInput" class="manual-input" placeholder="مثال: H9TQ17ADFTMC...">
        <button class="btn-search" id="btnSearch">بحث</button>
      </div>
    </section>

    <!-- Loading State -->
    <div class="loading-card" id="loadingCard">
      <div class="loader"></div>
      <div style="font-weight:700; margin-bottom:4px;">جاري التحليل...</div>
      <div style="font-size:12px; color:var(--muted);">نستخدم الذكاء الاصطناعي لمعالجة الصورة</div>
    </div>

    <!-- Result Card -->
    <section class="result-card" id="resultCard">
      <div class="result-header">
        <div class="result-status">
          <div class="status-dot"></div>
          تم التصنيف بنجاح
        </div>
        <div id="resultTime" style="font-size:11px; color:var(--muted);">الآن</div>
      </div>
      
      <div class="result-body">
        <div id="typeBadge" class="type-badge normal">NAND FLASH</div>
        
        <div class="storage-display">
          <span id="storageValue" class="storage-number">--</span>
          <span class="storage-unit">GB</span>
        </div>

        <div class="ram-bga">
          <div class="info-chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="6" y1="5" x2="6" y2="3"/><line x1="10" y1="5" x2="10" y2="3"/><line x1="14" y1="5" x2="14" y2="3"/><line x1="18" y1="5" x2="18" y2="3"/></svg>
            الرام: <strong id="ramValue">--</strong>
          </div>
          <div class="info-chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
            BGA: <strong id="bgaValue">--</strong>
          </div>
        </div>

        <div class="detected-code" id="detectedCode">--</div>
      </div>

      <div class="result-actions">
        <button class="btn-copy" id="btnCopy">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          نسخ
        </button>
        <button class="btn-next" id="btnNext">
          التالي
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </section>

  </main>

  <script>
    // --- Config ---
    const API_URL = '/api/analyze'; // سيتم توجيهه للسيرفر المحلي

    // --- State ---
    let state = {
      stream: null,
      isScanning: false,
      sessionCount: 0,
      autoCaptureTimer: null,
      progress: 0
    };

    // --- Elements ---
    const el = {
      video: document.getElementById('video'),
      canvas: document.getElementById('canvas'),
      btnCapture: document.getElementById('btnCapture'),
      fileInput: document.getElementById('fileInput'),
      manualInput: document.getElementById('manualInput'),
      btnSearch: document.getElementById('btnSearch'),
      loadingCard: document.getElementById('loadingCard'),
      resultCard: document.getElementById('resultCard'),
      sessionCount: document.getElementById('sessionCount'),
      captureRing: document.getElementById('captureRing'),
      ringProgress: document.getElementById('ringProgress'),
      ringText: document.getElementById('ringText'),
      dotFocus: document.getElementById('dotFocus'),
      dotLight: document.getElementById('dotLight'),
      dotStable: document.getElementById('dotStable')
    };

    // --- Camera Logic ---
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', focusMode: 'continuous', whiteBalanceMode: 'continuous' }
        });
        el.video.srcObject = stream;
        state.stream = stream;
        startAutoQualityCheck();
      } catch (err) {
        console.error("Camera error:", err);
        alert("يرجى السماح بالوصول للكاميرا");
      }
    }

    function startAutoQualityCheck() {
      // محاكاة لفحص الجودة (يمكن تحسينها بـ WebAssembly)
      setInterval(() => {
        el.dotFocus.className = 'q-dot good';
        el.dotLight.className = 'q-dot good';
        el.dotStable.className = 'q-dot good';
      }, 2000);
    }

    // --- Analysis Logic ---
    async function analyzeImage(base64Image, code = null) {
      el.loadingCard.classList.add('show');
      el.resultCard.classList.remove('show');
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: "claude-3-5-sonnet-20241022",
            max_tokens: 1000,
            messages: [{
              role: "user",
              content: [
                { type: "text", text: "Analyze this IC chip image or code. Identify: 1. Storage Capacity (GB), 2. RAM Size (GB), 3. BGA Type, 4. Chip Type (NAND/EMMC/UFS). Return JSON only: {\"storage\": \"\", \"ram\": \"\", \"bga\": \"\", \"type\": \"\", \"code\": \"\"}" },
                base64Image ? { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64Image } } : null,
                code ? { type: "text", text: `Manual code: ${code}` } : null
              ].filter(Boolean)
            }]
          })
        });

        const data = await response.json();
        const result = JSON.parse(data.content[0].text);
        showResult(result);
      } catch (err) {
        console.error("Analysis failed:", err);
        alert("فشل التحليل. يرجى المحاولة مرة أخرى.");
      } finally {
        el.loadingCard.classList.remove('show');
      }
    }

    function showResult(data) {
      document.getElementById('storageValue').textContent = data.storage || '--';
      document.getElementById('ramValue').textContent = data.ram || '--';
      document.getElementById('bgaValue').textContent = data.bga || '--';
      document.getElementById('detectedCode').textContent = data.code || '--';
      
      const typeBadge = document.getElementById('typeBadge');
      typeBadge.textContent = data.type || 'UNKNOWN';
      typeBadge.className = `type-badge ${data.type?.includes('GLASS') ? 'glass' : 'normal'}`;

      el.resultCard.classList.add('show');
      state.sessionCount++;
      el.sessionCount.textContent = state.sessionCount;
      
      // Haptic feedback if available
      if (window.navigator.vibrate) window.navigator.vibrate(50);
    }

    // --- Event Listeners ---
    el.btnCapture.addEventListener('click', () => {
      const ctx = el.canvas.getContext('2d');
      el.canvas.width = el.video.videoWidth;
      el.canvas.height = el.video.videoHeight;
      ctx.drawImage(el.video, 0, 0);
      const base64 = el.canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
      analyzeImage(base64);
    });

    el.btnSearch.addEventListener('click', () => {
      const code = el.manualInput.value.trim();
      if (code) analyzeImage(null, code);
    });

    el.btnNext.addEventListener('click', () => {
      el.resultCard.classList.remove('show');
      el.manualInput.value = '';
    });

    el.fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const base64 = event.target.result.split(',')[1];
          analyzeImage(base64);
        };
        reader.readAsDataURL(file);
      }
    });

    el.btnCopy.addEventListener('click', () => {
      const text = `IC Info:\nStorage: ${document.getElementById('storageValue').textContent}GB\nRAM: ${document.getElementById('ramValue').textContent}\nBGA: ${document.getElementById('bgaValue').textContent}\nCode: ${document.getElementById('detectedCode').textContent}`;
      navigator.clipboard.writeText(text);
      alert("تم النسخ!");
    });

    // Start
    initCamera();

  </script>
