<html lang="ar" dir="rtl"><head manus-helper-ready="true">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مصنّف الذاكرة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --glass: rgba(255,255,255,0.04);
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* LED Indicators */
  .led-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px 4px;
    background: var(--card);
  }
  .led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2a2a3a;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }
  .led.active {
    box-shadow: 0 0 6px 2px currentColor;
  }
  .led.scanning-led {
    animation: ledPulse 0.6s ease-in-out infinite;
  }
  @keyframes ledPulse {
    0%, 100% { box-shadow: 0 0 6px 2px currentColor; opacity: 1; }
    50% { box-shadow: 0 0 12px 4px currentColor; opacity: 0.7; }
  }
  .led.dimmed {
    opacity: 0.3;
  }
  .led[data-step="cache"].active { background: #00e676; color: #00e676; }
  .led[data-step="correction"].active { background: #aa66ff; color: #aa66ff; }
  .led[data-step="db"].active { background: #448aff; color: #448aff; }
  .led[data-step="learned"].active { background: #00e5ff; color: #00e5ff; }
  .led[data-step="fast"].active { background: #ffea00; color: #ffea00; }
  .led[data-step="careful"].active { background: #ff9100; color: #ff9100; }
  .led[data-step="fuzzy"].active { background: #ff4081; color: #ff4081; }
  .led[data-step="gemini"].active { background: #8d6e63; color: #8d6e63; }
  .led[data-step="failed"].active { background: #ff1744; color: #ff1744; }
  .led[data-step="no_credit"].active { background: #000; color: #555; box-shadow: 0 0 6px 2px #333; }

  /* Progress Bar */
  .progress-bar-container {
    width: 100%;
    height: 3px;
    background: #1a1a2a;
    overflow: hidden;
    margin: 0;
  }
  .progress-bar {
    width: 30%;
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #7b6cff);
    border-radius: 2px;
    transform: translateX(-100%);
    animation: none;
  }
  .progress-bar.scanning {
    animation: progressScan 1.2s ease-in-out infinite;
  }
  .progress-bar.done {
    width: 100%;
    transform: translateX(0);
    animation: none;
    transition: all 0.3s ease;
  }
  .progress-bar.error {
    width: 100%;
    transform: translateX(0);
    background: #ff1744;
    animation: none;
    transition: all 0.3s ease;
  }
  @keyframes progressScan {
    0% { transform: translateX(-100%); }
    50% { transform: translateX(200%); }
    100% { transform: translateX(-100%); }
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d0d1a 0%, #12121f 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    font-size: 20px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .header-count {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--muted);
  }

  .header-count span {
    color: var(--accent);
    font-weight: 700;
  }

  /* Main */
  .main { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* Camera Section */
  .camera-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 12px;
    position: relative;
  }

  .camera-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas { display: none; }

  .cam-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .target-frame {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 65%; aspect-ratio: 1.2;
    border: 2px solid rgba(0,212,255,0.6);
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
  }
  .target-frame::before, .target-frame::after,
  .target-frame .c1, .target-frame .c2 {
    content: ''; position: absolute; width: 18px; height: 18px;
    border-color: var(--accent); border-style: solid;
  }
  .target-frame::before { top:-2px;right:-2px;border-width:3px 3px 0 0;border-radius:0 6px 0 0; }
  .target-frame::after  { top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:6px 0 0 0; }
  .target-frame .c1     { bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 6px 0; }
  .target-frame .c2     { bottom:-2px;left:-2px;border-width:0 0 3px 3px;border-radius:0 0 0 6px; }

  .quality-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    padding: 8px 14px; display: flex; gap: 10px; align-items: center;
  }
  .q-item { display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted); }
  .q-dot { width:8px;height:8px;border-radius:50%;background:#333;transition:all 0.3s; }
  .q-dot.good { background:#00ff88;box-shadow:0 0 6px #00ff88; }
  .q-dot.warn { background:#ffaa00;box-shadow:0 0 6px #ffaa00; }
  .q-dot.bad  { background:#ff4455; }

  .auto-progress-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: rgba(0,0,0,0.5); z-index: 10;
  }
  .auto-progress-fill {
    height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #00ff88);
    transition: width 0.3s; border-radius: 0 2px 2px 0;
  }

  .btn-capture {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-capture:active { transform: scale(0.97); opacity: 0.9; }
  .btn-capture:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-upload {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    padding: 13px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  /* Manual input */
  .chat-msg { font-size:13px; line-height:1.5; padding:6px 10px; border-radius:10px; max-width:90%; }
  .chat-user { background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.2); align-self:flex-end; color:var(--text); }
  .chat-bot { background:rgba(255,255,255,0.04); border:1px solid var(--border); align-self:flex-start; color:var(--text); }
  .chat-from { font-weight:700; color:var(--accent); margin-left:4px; }
  .chat-bot .chat-from { color:var(--muted); }

  .manual-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 16px;
  }

  .manual-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .manual-input-row {
    display: flex;
    gap: 8px;
  }

  .manual-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    direction: ltr;
    text-align: left;
    outline: none;
  }

  .manual-input:focus { border-color: var(--accent); }

  .btn-search {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #000;
    font-weight: 700;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
  }

  /* Result card */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 8px;
    display: none;
  }

  .result-card.show { display: block; animation: slideUp 0.3s ease; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .result-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .result-body {
    padding: 14px 12px;
    text-align: center;
    position: relative;
  }

  /* Type badge */
  .type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .type-badge.normal {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
  }

  .type-badge.glass {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--accent2);
  }

  /* Storage display */
  .storage-display {
    margin: 8px 0;
  }

  .storage-number {
    font-size: 56px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -3px;
  }

  .storage-unit {
    font-size: 22px;
    font-weight: 700;
    color: var(--muted);
    margin-right: 4px;
  }

  .ram-bga {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
  }

  .info-chip {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .info-chip strong { color: var(--text); }

  /* Detected code */
  .detected-code {
    margin-top: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 13px;
    color: #00ff88;
    direction: ltr;
    text-align: left;
    word-break: break-all;
  }

  /* Action buttons */
  .result-actions {
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
  }

  .btn-copy {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-copy:active { background: rgba(0,212,255,0.1); border-color: var(--accent); }

  .btn-next {
    flex: 1;
    background: linear-gradient(135deg, var(--accent2), #ff3366);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-next:active { transform: scale(0.97); }

  .confirm-actions {
    padding: 8px 16px;
    display: flex;
    gap: 10px;
  }
  .btn-confirm {
    flex: 1;
    background: rgba(0,200,80,0.15);
    border: 1px solid rgba(0,200,80,0.4);
    border-radius: 10px;
    color: #00e676;
    font-family: Cairo, sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 9px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-confirm:active { background: rgba(0,200,80,0.3); transform: scale(0.97); }
  .btn-wrong {
    flex: 1;
    background: rgba(255,50,50,0.15);
    border: 1px solid rgba(255,50,50,0.4);
    border-radius: 10px;
    color: #ff5252;
    font-family: Cairo, sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 9px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-wrong:active { background: rgba(255,50,50,0.3); transform: scale(0.97); }
  .correction-form {
    padding: 8px 16px 12px;
    border-top: 1px solid var(--border);
  }

  /* Loading state */
  .loading-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 10px;
    display: none;
  }

  .loading-card.show { display: block; }

  /* Loading Animation */
  .loading-spinner {
    position: relative;
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
  }
  .loading-spinner::before,
  .loading-spinner::after {
    content: '';
    position: absolute;
    border-radius: 50%;
  }
  .loading-spinner::before {
    width: 72px;
    height: 72px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 1s linear infinite;
  }
  .loading-spinner::after {
    width: 50px;
    height: 50px;
    top: 11px;
    left: 11px;
    border: 3px solid transparent;
    border-top-color: #7b6cff;
    animation: spin 0.6s linear infinite reverse;
  }
  .loading-ic-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    animation: pulse-icon 1.5s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse-icon {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.9); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  .loading-text {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
    transition: all 0.4s ease;
  }
  .loading-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .loading-steps {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .loading-step {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    transition: all 0.4s ease;
  }
  .loading-step.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(0,212,255,0.08);
  }
  .loading-step.done {
    color: #00e676;
    border-color: #00e676;
    background: rgba(0,230,118,0.08);
  }
  .loading-step .step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .loading-step.active .step-dot {
    animation: blink 0.8s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Error */
  .error-card {
    background: rgba(255,50,50,0.08);
    border: 1px solid rgba(255,50,50,0.2);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #ff8888;
    display: none;
    text-align: center;
  }

  .error-card.show { display: block; }

  /* Session counter */
  .session-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .session-label { font-size: 12px; color: var(--muted); }
  .session-num {
    font-size: 22px;
    font-weight: 900;
    color: var(--accent);
  }

  /* API Key Screen */
  .api-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .api-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
  }

  .api-title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .api-desc {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .api-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: monospace;
    font-size: 13px;
    padding: 12px;
    direction: ltr;
    outline: none;
    margin-bottom: 12px;
  }

  .api-input:focus { border-color: var(--accent); }

  .btn-api {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 13px;
    cursor: pointer;
  }

  .api-note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 12px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #00ff88;
    color: #000;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 30px;
    font-size: 14px;
    transition: transform 0.3s;
    z-index: 999;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Camera mode toggle */
  .cam-toggle-row {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 5px 10px; background: var(--card); border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
  }
  .cam-toggle-label { font-weight: 600; opacity: 0.5; transition: opacity 0.3s; }
  .cam-toggle-label.active { opacity: 1; color: var(--accent); }
  .cam-toggle {
    position: relative; width: 40px; height: 22px;
    background: rgba(0,212,255,0.15); border-radius: 11px;
    cursor: pointer; transition: background 0.3s;
  }
  .cam-toggle.on { background: rgba(0,212,255,0.3); }
  .cam-toggle-knob {
    position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); transition: left 0.3s;
    box-shadow: 0 0 4px rgba(0,212,255,0.4);
  }
  .cam-toggle.on .cam-toggle-knob { left: 20px; }

  /* Not found */
  .not-found {
    color: var(--accent2);
    font-size: 16px;
    font-weight: 700;
    margin: 8px 0;
  }
</style>
</head>
<body>

<!-- API Key on server - no screen needed -->

<div class="header">
  <div class="header-logo">البحراوي | لتصنيف الذواكر ⚡</div>
  <div class="header-count">الجلسة: <span id="sessionCount">0</span> قطعة</div>
</div>

<div class="main">

  <!-- Camera Section -->
  <div class="camera-section">
    <div class="camera-wrapper" id="cameraWrapper">

  // stepName ممكن يكون مركب زي fast_db أو careful_correction
  var parts = stepName.split('_');
  var mainStep = parts[0]; // fast أو careful أو cache...
  var subStep = parts.length > 1 ? parts[1] : null; // db أو correction...
  
  // نور كل اللمبات اللي اتعدت (dimmed)
  var found = false;
  LED_STEPS.forEach(function(s) {
    var el = document.querySelector('.led[data-step="'+s+'"]');
    if (!el) return;
    if (s === mainStep) {
      el.classList.add('active');
      el.classList.remove('dimmed');
      found = true;
    } else if (!found) {
      // اللمبات اللي قبلها - اتعدت
      el.classList.add('dimmed');
      el.classList.remove('active');
    }
  });
  
  // لو فيه subStep (زي fast_db) نور اللمبة الفرعية كمان
  if (subStep) {
    var subEl = document.querySelector('.led[data-step="'+subStep+'"]');
    if (subEl) {
      subEl.classList.add('active');
      subEl.classList.remove('dimmed');
    }
  }
}

// محاكاة اللمبات أثناء التحليل - بتنور واحدة واحدة
var ledAnimTimer = null;
var ledAnimStep = 0;
// الخطوات الأولى (كاش/تصحيحات/جداول/متعلم) بتعدي بسرعة، الباقي ببطء
var LED_ANIM_DELAYS = [300, 300, 400, 400, 1500, 2500, 1500, 1500];
var LED_ANIM_STEPS = ['cache','correction','db','learned','fast','careful','fuzzy','gemini'];

function startLEDAnimation() {
  stopLEDAnimation();
  ledAnimStep = 0;
  animateNextLED();
}

function animateNextLED() {
  if (ledAnimStep >= LED_ANIM_STEPS.length) return;
  var step = LED_ANIM_STEPS[ledAnimStep];
  // نور اللمبة الحالية واطفي اللي قبلها
  LED_ANIM_STEPS.forEach(function(s, i) {
    var el = document.querySelector('.led[data-step="'+s+'"]');
    if (!el) return;
    if (i < ledAnimStep) {
      el.classList.add('dimmed');
      el.classList.remove('active','scanning-led');
    } else if (i === ledAnimStep) {
      el.classList.add('active','scanning-led');
      el.classList.remove('dimmed');
    } else {
      el.classList.remove('active','dimmed','scanning-led');
    }
  });
  ledAnimStep++;
  ledAnimTimer = setTimeout(animateNextLED, LED_ANIM_DELAYS[ledAnimStep-1] || 1000);
}

function stopLEDAnimation() {
  if (ledAnimTimer) { clearTimeout(ledAnimTimer); ledAnimTimer = null; }
  // شيل كلاس scanning-led من كل اللمبات
  LED_ANIM_STEPS.forEach(function(s) {
    var el = document.querySelector('.led[data-step="'+s+'"]');
    if (el) el.classList.remove('scanning-led');
  });
}

function startScanBar() {
  var bar = document.getElementById('scanBar');
  if (bar) { bar.className = 'progress-bar scanning'; }
}

function stopScanBar(success) {
  var bar = document.getElementById('scanBar');
  if (bar) { bar.className = 'progress-bar ' + (success ? 'done' : 'error'); }
  setTimeout(function() {
    if (bar) bar.className = 'progress-bar';
  }, 3000);
}

function searchInDB(code) {
  if (!code) return null;
  const codeUpper = code.toUpperCase().trim();
  
  // 1. Search عادي first
  for (const [capacity, codes] of Object.entries(NORMAL_DB)) {
    for (const c of codes) {
      if (codeUpper === c.toUpperCase() || codeUpper.startsWith(c.toUpperCase().split('-')[0])) {
        return { capacity, type: 'عادي', raw: capacity };
      }
    }
  }
  
  // 2. Search EMMC big table (زجاجي) - 90%
  for (const [size, codes] of Object.entries(EMMC_DB)) {
    for (const c of codes) {
      if (codeUpper === c.toUpperCase() || codeUpper.includes(c.toUpperCase())) {
        return { storage: size, type: 'زجاجي' };
      }
    }
  }
  
  // 3. Search Micron DB
  for (const [size, codes] of Object.entries(MICRON_DB)) {
    for (const c of codes) {
      if (codeUpper === c.toUpperCase()) {
        return { storage: size, type: 'زجاجي' };
      }
    }
  }
  
  // 4. Try shortcuts - العادي first (by company)
  // Samsung (KM): حرف قبل 100/200/600/700/800/900
  if (codeUpper.startsWith('KM')) {
    // قاعدة خاصة: KMK + رقم + X → 7X=8GB, 8X=16GB, X بس=32GB
    const kmkNum = codeUpper.match(/KMK(\d)X/);
    if (kmkNum) {
      if (kmkNum[1] === '7') return { storage: '8', type: 'عادي', fromShortcut: true };
      if (kmkNum[1] === '8') return { storage: '16', type: 'عادي', fromShortcut: true };
    }
    // القاعدة العامة: حرف قبل 000/100/200/600/700/800/900
    const samsungMap = {'N':'8','E':'16','X':'32','D':'32','C':'64','H':'64','P':'64','G':'128','V':'128','F':'256','S':'256'};
    const m = codeUpper.match(/([NEXDCHPGVFS])(000|100|200|600|700|800|900)/);
    if (m && samsungMap[m[1]]) return { storage: samsungMap[m[1]], type: 'عادي', fromShortcut: true };
  }
  
  // SK Hynix (H9): الرقم في السطر الثاني بعد أول 4 حروف
  if (codeUpper.startsWith('H9')) {
    const hynixMap = {'17':'16','18':'16','19':'16','Q31':'16','Q82':'16','F31':'16','F82':'16','R31':'16','26':'32','27':'32','52':'64','53':'64','16':'128'};
    const num = codeUpper.substring(4, 6);
    if (hynixMap[num]) return { storage: hynixMap[num], type: 'عادي', fromShortcut: true };
  }
  
  // SanDisk (SDIN): المساحة صريحة في الكود
  if (codeUpper.startsWith('SDIN')) {
    const m = codeUpper.match(/(16G|32G|64G|128G|256G|512G)/);
    if (m) return { storage: m[1].replace('G',''), type: 'عادي', fromShortcut: true };
  }
  
  // Samsung EMMC (KLM/KLU): حرف في السطر الثالث
  if (codeUpper.startsWith('KLM') || codeUpper.startsWith('KLU')) {
    const emmcMap = {'AG':'16','BG':'32','CG':'64','DG':'128','EG':'256','FG':'512'};
    for (const [k,v] of Object.entries(emmcMap)) {
      if (codeUpper.includes(k)) return { storage: v, type: 'زجاجي', fromShortcut: true };
    }
  }
  
  // Toshiba (THG): حرفين في السطر الثالث
  if (codeUpper.startsWith('THG') || codeUpper.startsWith('THGB') || codeUpper.startsWith('THGA')) {
    const toshibaMap = {'G7':'16','G8':'32','G9':'64','T0':'128','T1':'256','T2':'512'};
    for (const [k,v] of Object.entries(toshibaMap)) {
      if (codeUpper.includes(k)) return { storage: v, type: 'زجاجي', fromShortcut: true };
    }
  }
  
  // SK Hynix EMMC (H26/H28): الرقم بعد H26M أو H28
  if (codeUpper.startsWith('H26') || codeUpper.startsWith('H28')) {
    const hynixEmmcMap = {'54':'16','64':'32','74':'64','88':'128','9':'256'};
    const m = codeUpper.match(/H2[68][A-Z]?(\d+)/);
    if (m) {
      const num = m[1].substring(0,2);
      const num1 = m[1].substring(0,1);
      if (hynixEmmcMap[num]) return { storage: hynixEmmcMap[num], type: 'زجاجي', fromShortcut: true };
      if (hynixEmmcMap[num1]) return { storage: hynixEmmcMap[num1], type: 'زجاجي', fromShortcut: true };
    }
  }
  
  // UNIC: آخر سطر
  if (codeUpper.endsWith('05G')) return { storage: '32', type: 'زجاجي', fromShortcut: true };
  if (codeUpper.endsWith('06G')) return { storage: '64', type: 'زجاجي', fromShortcut: true };
  if (codeUpper.endsWith('07G')) return { storage: '128', type: 'زجاجي', fromShortcut: true };
  
  // YMEC (زجاجي) - الحرف الخامس بعد YMEC مع مرادفات
  if (codeUpper.startsWith('YMEC') && codeUpper.length >= 5) {
    const ymecChar = codeUpper[4].toUpperCase();
    const ymecMap = { '6':'32', 'G':'32', '7':'64', '8':'128', 'B':'128', '9':'256' };
    if (ymecMap[ymecChar]) {
        return { storage: ymecMap[ymecChar], type: 'زجاجي', fromShortcut: true };
    }
  }
  
  // 5. بحث عام بالحرف + الرقم (لأي كود فيه حرف قبل رقم معروف)
  var generalMap = {'N':'8','E':'16','X':'32','D':'32','C':'64','H':'64','P':'64','G':'128','V':'128','F':'256','S':'256'};
  var generalMatch = codeUpper.match(/([NEXDCHPGVFS])(000|100|200|600|700|800|900|6001|7001|8001|9001)/i);
  if (generalMatch && generalMap[generalMatch[1].toUpperCase()]) {
    return { storage: generalMap[generalMatch[1].toUpperCase()], type: 'عادي', fromShortcut: true };
  }

  // 6. Unknown - save for later
  if (code && code.length > 3) {
    if (!unknownCodes.find(u => u.code === code)) {
      unknownCodes.push({ code, date: new Date().toLocaleDateString('ar') });
      try { localStorage.setItem('unknownCodes', JSON.stringify(unknownCodes)); } catch(e){}
    }
  }
  
  return null;
}


async function analyzeImage(base64, previewSrc) {
  if (isAnalyzing) return;
  isAnalyzing = true;
  lastBase64 = base64;
  resetLEDs();
  startLEDAnimation();
  startScanBar();
  showLoading(true);
  showResult(false);
  showError(false);



  // ===== المرحلة الأولى: اقرأ الكود من الصورة عبر السيرفر =====
  // API key محفوظ على السيرفر فقط - مش ظاهر هنا

  try {
    // إرسال الصورة + الأكواد المتعلمة للـ Server
    var geminiRes = await fetch('/api/analyze', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ imageBase64: base64, learnedCodes: cloudLearned })
    });

    if (!geminiRes.ok) {
      var errData = {};
      try { errData = await geminiRes.json(); } catch(e){}
      stopLEDAnimation();
      lightLED(errData.step || 'failed');
      stopScanBar(false);
      showLoading(false);
      showError('❌ ' + (errData.error || 'فشل التحليل - جرب تاني'));
      isAnalyzing = false;
      return;
    }

    var parsed = await geminiRes.json();
    if (!parsed.code) parsed = {code:'', storage:'', type:'', company:''};
    
    // نور اللمبة الصح
    stopLEDAnimation();
    if (parsed.step) lightLED(parsed.step);

    lastParsed = parsed;
    var detectedCode = parsed.code || '';
    currentCode = detectedCode;
    var manualInput = document.getElementById('manualCode');
    if (manualInput) manualInput.value = detectedCode;

    // لو ما لقاش كود - السيرفر جرب مرتين (سريعة + بعناية) ومش لاقي
    if (!detectedCode || !isValidCode(detectedCode)) {
      stopLEDAnimation();
      lightLED('failed');
      stopScanBar(false);
      showLoading(false);
      addChatMsg('المساعد', '❓ مش شايف كود ذاكرة - صوّر أقرب على الشريحة السوداء الكبيرة أو اكتب الكود يدوي', 'bot');
      showError('❌ مش شايف كود ذاكرة');
      isAnalyzing = false;
      return;
    }

    // ===== الـ Server رجّع النتيجة مباشرة (storage + type) =====
    if (parsed.storage && parsed.type) {
      stopScanBar(true);
      updateStats(parsed.company, true);
      showLoading(false);
      displayResult(detectedCode, {
        storage: parsed.storage,
        type: parsed.type,
        capacity: parsed.storage + (parsed.type === 'عادي' ? '+?' : '')
      }, parsed.company);

      if (stream && cameraActive) setTimeout(startAutoAnalysis, 2000);
      return;
    }

    // ===== كود جديد مجهول - اسأل المستخدم =====

  } catch(e) {
    stopLEDAnimation();
    lightLED('failed');
    stopScanBar(false);
    showLoading(false);
    showError('⚠️ خطأ في الاتصال\n' + e.message);

}

// ===== استخراج الرام من كود Samsung =====
var SAMSUNG_RAM_MAP = {
  'S': '1', '2': '1', '6': '1.5',
  'K': '2', '1': '2', '3': '2',
  'A': '3', 'B': '3', '8': '3',
  'D': '4',
  '4': '6', 'C': '6',
  'J': '8', 'P': '8',
  'L': '10', 'M': '12'
};

function extractSamsungRam(code) {
  if (!code) return null;
  // Samsung codes: KM... or H9...
  // الجزء قبل الشرطة
  var mainPart = code.split('-')[0];
  if (mainPart.length < 3) return null;
  // الحرف قبل الأخير
  var penultimate = mainPart[mainPart.length - 2].toUpperCase();
  var ram = SAMSUNG_RAM_MAP[penultimate];
  if (ram) return ram;
  return null;
}

function displayResult(code, found, company) {
  document.getElementById('detectedCode').textContent = code;
  document.getElementById('resultTime').textContent = new Date().toLocaleTimeString('ar');



  if (found) {
    const storage = found.storage || (found.capacity ? found.capacity.split('+')[0] : '?');
    currentDisplayStorage = storage; // احفظ المساحة الحالية
    const isGlass = found.type === 'زجاجي';

    document.getElementById('typeBadge').innerHTML = 
      `<div class="type-badge ${isGlass ? 'glass' : 'normal'}">${isGlass ? '🔵 زجاجي' : '⚪ عادي'}</div>`;


    document.getElementById('storageNum').textContent = storage;


    let ramHtml = '';
    // 1. أولاً: لو في capacity فيها + (من الجدول)
    if (found.type === 'عادي' && found.capacity && found.capacity.includes('+')) {
      const parts = found.capacity.split('+');
      let ramRaw = parts[1].replace(/D[0-9]|正码|杂码|UMCP/g,'').trim();
      const storageNum = parts[0].trim();
      let ramDisplay = ramRaw;
      if (storageNum === '16') {
        if (ramRaw === '1' || ramRaw === '1.5') ramDisplay = '1';
        else if (ramRaw === '2' || ramRaw === '3') ramDisplay = '2';
      }
      if (ramDisplay) ramHtml = `<div class="info-chip">💾 RAM <strong>${ramDisplay} GB</strong></div>`;
    }
    // 2. لو مفيش رام من الجدول → جرب استخراجها من الكود (Samsung)
    if (!ramHtml && code) {
      var samsungRam = extractSamsungRam(code);
      if (samsungRam) ramHtml = `<div class="info-chip">💾 RAM <strong>${samsungRam} GB</strong></div>`;
    }
    document.getElementById('ramBga').innerHTML = ramHtml;

  } else {
    document.getElementById('typeBadge').innerHTML = '<div class="type-badge normal">⚠️ كود جديد - تم الحفظ</div>';

    document.getElementById('storageNum').textContent = '?';

  }

  showResult(true);
}

function analyzeFrame() {
  if (!stream || isAnalyzing) return;
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  if (!video || !canvas || video.videoWidth === 0) return;
  
  var ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  
  // ناخد منطقة المنتصف (50%)
  var cx = Math.floor(canvas.width * 0.25);
  var cy = Math.floor(canvas.height * 0.25);
  var cw = Math.floor(canvas.width * 0.5);
  var ch = Math.floor(canvas.height * 0.5);
  var imgData = ctx.getImageData(cx, cy, cw, ch);
  var data = imgData.data;
  
  // 1. الحدة - Laplacian variance
  var sharp = 0;
  for (var y = 1; y < ch-1; y += 4) {
    for (var x = 1; x < cw-1; x += 4) {
      var idx = (y * cw + x) * 4;
      var center = data[idx];
      var top = data[((y-1)*cw+x)*4] || 0;
      var bottom = data[((y+1)*cw+x)*4] || 0;
      var left = data[(y*cw+(x-1))*4] || 0;
      var right = data[(y*cw+(x+1))*4] || 0;
      sharp += Math.abs(4*center - top - bottom - left - right);
    }
  }
  sharp = Math.min(sharp / 1000, 100);
  
  // 2. الثبات
  var stability = 50;
  if (prevFrame && prevFrame.length === data.length) {
    var diff = 0;
    for (var i = 0; i < data.length; i += 16)
      diff += Math.abs(data[i] - prevFrame[i]);
    diff /= (data.length / 16);
    stability = Math.max(0, 100 - diff * 2);
  }
  prevFrame = new Uint8ClampedArray(data);
  
  // 3. الإضاءة
  var brightness = 0;
  for (var i = 0; i < data.length; i += 4)
    brightness += (data[i] + data[i+1] + data[i+2]) / 3;
  brightness /= (data.length / 4);
  
  // الشروط
  var qSharp = sharp > 15 ? 'good' : sharp > 8 ? 'warn' : 'bad';
  var qStable = stability > 70 ? 'good' : stability > 40 ? 'warn' : 'bad';
  var qLight = (brightness > 60 && brightness < 220) ? 'good' : brightness > 30 ? 'warn' : 'bad';
  
  // تحديث المؤشرات
  document.getElementById('qSharp').className = 'q-dot ' + qSharp;
  document.getElementById('qStable').className = 'q-dot ' + qStable;
  document.getElementById('qLight').className = 'q-dot ' + qLight;
  
  // العداد - لو الـ 3 شروط good يعد، لو لا يرجع للورا
  var allGood = qSharp === 'good' && qStable === 'good' && qLight === 'good';
  if (allGood) {
    autoProgress = Math.min(100, autoProgress + 3);
  } else {
    autoProgress = Math.max(0, autoProgress - 5);
  }
  
  // رسائل التوجيه
  var msg = 'وجّه الكاميرا';
  if (qLight === 'bad') msg = '💡 الإضاءة ضعيفة';
  else if (qSharp === 'bad') msg = '🔍 قرّب أكتر';
  else if (qStable === 'bad') msg = '✋ ثبّت إيدك';
  else if (allGood && autoProgress < 100) msg = '✨ ممتاز! ثبّت... ' + autoProgress + '%';
  else if (allGood && autoProgress >= 100) msg = '📸 جاري التصنيف...';
  
  updateAutoUI(autoProgress, msg);
  
  // لما يوصل 100 يلتقط
  if (autoProgress >= 100) {
    stopAutoAnalysis();
    captureAndAnalyze();
  }
}

// ===== لمسة الشاشة = تصوير فوري =====
function tapCapture() {
  if (!stream || !cameraActive || isAnalyzing) return;
  stopAutoAnalysis();
  // تأثير بصري - فلاش أبيض
  var wrapper = document.getElementById('cameraWrapper');
  if (wrapper) {
    wrapper.style.opacity = '0.3';
    setTimeout(function(){ wrapper.style.opacity = '1'; }, 150);
  }
  captureAndAnalyze();
}

function captureAndAnalyze() {
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  if (!video || !canvas) return;
  var ctx = canvas.getContext('2d');
  canvas.width = Math.max(video.videoWidth, 1280);
  canvas.height = Math.max(video.videoHeight, 720);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  var base64 = canvas.toDataURL('image/jpeg', 1.0);
  var imageData = base64.split(',')[1];
  analyzeImage(imageData, base64);
}

function updateAutoUI(progress, msg) {
  var fill = document.getElementById('autoProgressFill');
  if (fill) fill.style.width = progress + '%';
  var el = document.getElementById('autoMsg');
  if (el && msg) el.textContent = msg;
}



// ===== VALID CODE PREFIXES FOR VALIDATION =====
// أي كود طوله 4 حروف أو أكتر = مقبول بدون قيود

function isValidCode(code) {
  if (!code || code.length < 4) return false;
  // لازم يكون إنجليزي + أرقام + رموز فقط (مش عربي)
  if (/[\u0600-\u06FF]/.test(code)) return false;
  // لازم يحتوي على حرف إنجليزي واحد على الأقل ورقم واحد
  if (!/[A-Za-z]/.test(code)) return false;
  if (!/[0-9]/.test(code)) return false;
  return true;
}

// ===== SESSION STATS =====
var sessionStats = { total: 0, correct: 0, wrong: 0, corrected: 0, companies: {} };

function updateStats(company, wasCorrect) {
  sessionStats.total++;
  if (wasCorrect) sessionStats.correct++;
  else sessionStats.wrong++;
  if (company) {
    sessionStats.companies[company] = (sessionStats.companies[company] || 0) + 1;
  }
  renderStats();
}

function renderStats() {
  var el = document.getElementById('statsBar');
  if (!el) return;
  var topCompany = '';
  var topCount = 0;
  for (var c in sessionStats.companies) {
    if (sessionStats.companies[c] > topCount) { topCount = sessionStats.companies[c]; topCompany = c; }
  }
  el.innerHTML = 
    '<span>📊 الجلسة: <b>' + sessionStats.total + '</b></span>' +
    '<span>✅ صح: <b>' + sessionStats.correct + '</b></span>' +
    '<span>❌ غلط: <b>' + sessionStats.wrong + '</b></span>' +
    (sessionStats.corrected ? '<span>🎓 تعلّم: <b>' + sessionStats.corrected + '</b></span>' : '') +
    (topCompany ? '<span>🏆 الأكثر: <b>' + topCompany + '</b></span>' : '');
}

// ===== CHAT SYSTEM =====
var lastBase64 = null;
var lastParsed = null;
var chatHistory = [];

function sendChat() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  chatHistory.push({role: 'user', text: msg});
  addChatMsg('أنت', msg, 'user');
  processChat(msg);
}

function addChatMsg(from, text, role) {
  var box = document.getElementById('chatMessages');
  if (!box) return;
  var div = document.createElement('div');
  div.className = 'chat-msg chat-' + role;
  div.innerHTML = '<span class="chat-from">' + from + ':</span> ' + text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  if (role === 'bot' && !text.includes('جاري التفكير')) {
    chatHistory.push({role: 'bot', text: text});
  }
}

async function processChat(userMsg) {
  var lower = userMsg.toLowerCase();

  // الشات بيشتغل حتى بدون صورة - Gemini بيرد

  // ===== لو المستخدم بيقول له كود - ابحث فيه في البيانات أول =====
  var mentionedCode = userMsg.trim().split(/\s+/).map(function(w) {
    return w.replace(/[.,;:!?]+$/g, '').trim(); // تنظيف الرموز
  }).find(function(w) {
    return w.length >= 4 && isValidCode(w);
  });

  if (mentionedCode) {
    // دور في البيانات
    var dbResult = searchInDB(mentionedCode);
    if (dbResult) {
      displayResult(mentionedCode, dbResult, '');
      currentCode = mentionedCode;
      lastParsed = {code: mentionedCode};
      var manualInput = document.getElementById('manualCode');
      if (manualInput) manualInput.value = mentionedCode;
      addChatMsg('المساعد', '✅ لقيته في البيانات: ' + mentionedCode + ' → ' + (dbResult.storage || dbResult.capacity) + ' GB ' + dbResult.type + (dbResult.fromShortcut ? ' (من الاختصار)' : ' (من الجدول)'), 'bot');
      return;
    }
    // دور في التعلم من السحابة
    var learnedRes = cloudLearned.find(function(l){ return l.code && l.code.toUpperCase() === mentionedCode.toUpperCase(); });
    if (learnedRes) {
      addChatMsg('المساعد', '🧠 تعلمتها منك: ' + mentionedCode + ' → ' + (learnedRes.storage || '?') + ' GB ' + (learnedRes.type === 'glass' ? 'زجاجي' : 'عادي') + (learnedRes.corrected ? ' (من تصحيح المستخدم)' : ' (متعلم)'), 'bot');
      return;
    }
  }

  // ===== لو عنده كود من قبل - بس لو المستخدم بيصحح النوع اسمعه =====
  var isGlassCorrection = lower.includes('زجاجي') || lower.includes('glass');
  var isNormalCorrection = lower.includes('عادي') || lower.includes('normal');

  // لو فيه كود حالي (من lastParsed أو currentCode)
  var activeCode = (lastParsed && lastParsed.code) || currentCode;
  if (activeCode) activeCode = activeCode.replace(/[.,\s]+$/g, '').trim();

  if (activeCode && !mentionedCode) {
    // لو المستخدم بيصحح النوع - اسمعه وحفظ
    if (isGlassCorrection || isNormalCorrection) {
      var existingResult2 = searchInDB(activeCode);
      // دور على المساحة من كل المصادر
      var sizeMatch2 = userMsg.match(/(\d+)\s*(جيجا|GB|gb|G|g)?/i);
      var storage2 = '';
      if (sizeMatch2) storage2 = sizeMatch2[1];
      else if (existingResult2) storage2 = existingResult2.storage || existingResult2.capacity || '';
      else if (lastParsed && lastParsed.storage) storage2 = lastParsed.storage;
      else if (currentDisplayStorage) storage2 = currentDisplayStorage;
      
      var newType = isGlassCorrection ? 'زجاجي' : 'عادي';
      var existIdx3 = cloudLearned.findIndex(function(x){ return x.code && x.code.toUpperCase() === activeCode.toUpperCase(); });
      var newEntry3 = { code: activeCode, company: (lastParsed && lastParsed.company) || '', type: isGlassCorrection ? 'glass' : 'normal', storage: storage2, corrected: true };
      if (existIdx3 >= 0) {
        cloudLearned[existIdx3] = newEntry3;
      } else {
        cloudLearned.push(newEntry3);
      }
      localStorage.setItem('ic_learned', JSON.stringify(cloudLearned));
      jbinSave(cloudLearned);
      displayResult(activeCode, {storage: storage2 || '?', type: newType}, (lastParsed && lastParsed.company) || '');
      currentCode = activeCode;
      addChatMsg('المساعد', '✅ تم التصحيح! ' + activeCode + ' → ' + (storage2 || '?') + ' GB ' + newType + ' 🧠', 'bot');
      return;
    }
    // لو المستخدم بيقول مساحة بس بدون نوع - ادور في البيانات
    var existingResult = searchInDB(activeCode);
    if (existingResult) {
      displayResult(activeCode, existingResult, (lastParsed && lastParsed.company) || '');
      currentCode = activeCode;
      addChatMsg('المساعد', '✅ ' + activeCode + ' → ' + (existingResult.storage || existingResult.capacity) + ' GB ' + existingResult.type, 'bot');
      return;
    }
  }

  // ===== لو المستخدم بيقول تفاصيل الشركة والمساحة - احفظها =====
  // دور على الأرقام الصح: 8, 16, 32, 64, 128, 256, 512 بس
  var validSizes = ['512','256','128','64','32','16','8'];
  var sizeMatch = null;
  for (var si = 0; si < validSizes.length; si++) {
    var re = new RegExp('(?<![A-Z0-9])' + validSizes[si] + '(?![A-Z0-9])', 'i');
    if (re.test(userMsg)) {
      sizeMatch = [null, validSizes[si]];
      break;
    }
  }
  var isGlass = lower.includes('زجاجي') || lower.includes('glass');
  var isNormal = lower.includes('عادي') || lower.includes('normal');
  var codeToSave = mentionedCode || (lastParsed && lastParsed.code) || currentCode;
  // تنظيف الكود من الرموز الزيادة (نقطة، فاصلة، مسافة)
  if (codeToSave) codeToSave = codeToSave.replace(/[.,\s]+$/g, '').trim();

  if (codeToSave && sizeMatch && (isGlass || isNormal)) {
    // المستخدم بيعلمه - احفظ على cloudLearned مباشرة بدون ما تمسح حاجة
    var existIdx = cloudLearned.findIndex(function(x){ return x.code && x.code.toUpperCase() === codeToSave.toUpperCase(); });
    var newEntry = {code: codeToSave, company: '', type: isGlass ? 'glass' : 'normal', storage: sizeMatch[1], corrected: true};
    if (existIdx >= 0) {
      cloudLearned[existIdx] = newEntry; // حدّث لو موجود
    } else {
      cloudLearned.push(newEntry); // أضف جديد
    }
    localStorage.setItem('ic_learned', JSON.stringify(cloudLearned));
    jbinSave(cloudLearned);
    sessionStats.corrected++;
    renderStats();
    displayResult(codeToSave, {storage: sizeMatch[1], type: isGlass ? 'زجاجي' : 'عادي'}, '');
    currentCode = codeToSave;
    addChatMsg('المساعد', '✅ تم الحفظ! ' + codeToSave + ' → ' + sizeMatch[1] + ' GB ' + (isGlass ? 'زجاجي' : 'عادي') + ' 🧠', 'bot');
    return;
  }

  // ═══ Fallback: ابعت لـ Gemini يرد رد ذكي ═══
  try {
    addChatMsg('المساعد', '💭 جاري التفكير...', 'bot');
    var chatRes = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: userMsg,
        context: {
          code: currentCode || (lastParsed && lastParsed.code) || '',
          storage: currentDisplayStorage || (lastParsed && lastParsed.storage) || '',
          type: (lastParsed && lastParsed.type) || '',
          company: (lastParsed && lastParsed.company) || ''
        },
        history: chatHistory.slice(-10),
        learnedCodes: cloudLearned
      })
    });
    var chatData = await chatRes.json();
    // امسح رسالة "جاري التفكير" واعرض الرد الحقيقي
    var msgs = document.getElementById('chatMessages');
    if (msgs && msgs.lastChild) msgs.removeChild(msgs.lastChild);
    addChatMsg('المساعد', chatData.reply || '❓ مش فاهم - قولي المساحة والنوع', 'bot');
  } catch(chatErr) {
    addChatMsg('المساعد', '❓ الكود: ' + (currentCode || '?') + ' - قولي المساحة والنوع (مثال: 64 زجاجي)', 'bot');
  }
}



function uploadImage(event) {
  var file = event.target.files[0];
  if (!file) return;
  stopAutoAnalysis();
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64Full = e.target.result;
    var imageData = base64Full.split(',')[1];
    analyzeImage(imageData, base64Full);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}
