<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>فارز IC</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --glass: rgba(255,255,255,0.04);
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d0d1a 0%, #12121f 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    font-size: 20px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .header-count {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--muted);
  }

  .header-count span {
    color: var(--accent);
    font-weight: 700;
  }

  /* Main */
  .main { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* Camera Section */
  .camera-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
  }

  .camera-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas { display: none; }

  /* Overlay */
  .cam-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Target frame */
  .target-frame {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 65%;
    aspect-ratio: 1.2;
    border: 2px solid rgba(0,212,255,0.6);
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
  }

  .target-frame::before, .target-frame::after,
  .target-frame .c1, .target-frame .c2 {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--accent);
    border-style: solid;
  }
  .target-frame::before { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
  .target-frame::after  { top: -2px; left: -2px;  border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
  .target-frame .c1     { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }
  .target-frame .c2     { bottom: -2px; left: -2px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }

  /* Scan line */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 2s linear infinite;
    opacity: 0;
  }
  .scanning .scan-line { opacity: 1; }
  @keyframes scan {
    0% { top: 20%; }
    100% { top: 80%; }
  }

  /* Quality indicators */
  .quality-bar {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    padding: 10px 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .q-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
  }

  .q-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    transition: all 0.3s;
  }

  .q-dot.good { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  .q-dot.warn { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; }
  .q-dot.bad  { background: #ff4455; }

  /* Progress ring */
  .auto-capture-ring {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 48px;
    height: 48px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .auto-capture-ring.visible { opacity: 1; }

  .ring-svg circle {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 126;
    stroke-dashoffset: 126;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 0.1s;
  }

  .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
  }

  /* Camera controls */
  .cam-controls {
    padding: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-capture {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-capture:active { transform: scale(0.97); opacity: 0.9; }
  .btn-capture:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-upload {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    padding: 13px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  /* Manual input */
  .manual-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 16px;
  }

  .manual-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .manual-input-row {
    display: flex;
    gap: 8px;
  }

  .manual-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    direction: ltr;
    text-align: left;
    outline: none;
  }

  .manual-input:focus { border-color: var(--accent); }

  .btn-search {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #000;
    font-weight: 700;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
  }

  /* Result card */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    display: none;
  }

  .result-card.show { display: block; animation: slideUp 0.3s ease; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .result-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .result-body {
    padding: 24px 16px;
    text-align: center;
    position: relative;
  }

  /* Type badge */
  .type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .type-badge.normal {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
  }

  .type-badge.glass {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--accent2);
  }

  /* Storage display */
  .storage-display {
    margin: 8px 0;
  }

  .storage-number {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -3px;
  }

  .storage-unit {
    font-size: 28px;
    font-weight: 700;
    color: var(--muted);
    margin-right: 4px;
  }

  .ram-bga {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
  }

  .info-chip {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .info-chip strong { color: var(--text); }

  /* Detected code */
  .detected-code {
    margin-top: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 13px;
    color: #00ff88;
    direction: ltr;
    text-align: left;
    word-break: break-all;
  }

  /* Action buttons */
  .result-actions {
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
  }

  .btn-copy {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-copy:active { background: rgba(0,212,255,0.1); border-color: var(--accent); }

  .btn-next {
    flex: 1;
    background: linear-gradient(135deg, var(--accent2), #ff3366);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-next:active { transform: scale(0.97); }

  /* Loading state */
  .loading-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    text-align: center;
    display: none;
    margin-bottom: 16px;
  }

  .loading-card.show { display: block; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--glass);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 14px; color: var(--muted); }

  /* Error state */
  .error-card {
    background: rgba(255,68,85,0.1);
    border: 1px solid rgba(255,68,85,0.3);
    border-radius: 16px;
    padding: 14px;
    color: #ff4455;
    font-size: 13px;
    text-align: center;
    margin-bottom: 16px;
    display: none;
    white-space: pre-line;
  }

  .error-card.show { display: block; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #00ff88;
    color: #000;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Hidden input */
  #fileInput { display: none; }

  /* Preview img */
  #imgPreview {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 5;
    display: none;
  }
  #imgPreview.show { display: block; }

</style>
</head>
<body>

<header class="header">
  <div class="header-logo">فارز IC ⚡</div>
  <div class="header-count">الجلسة: <span id="sessionCount">0</span> قطعة</div>
</header>

<main class="main">
  <!-- Camera Section -->
  <section class="camera-section">
    <div class="camera-wrapper">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <img id="imgPreview">
      
      <div class="cam-overlay">
        <div class="target-frame">
          <div class="c1"></div><div class="c2"></div>
          <div class="scan-line"></div>
        </div>
        
        <div class="auto-capture-ring" id="captureRing">
          <svg class="ring-svg" viewBox="0 0 44 44">
            <circle cx="22" cy="22" r="20"></circle>
          </svg>
          <div class="ring-text" id="ringText">3</div>
        </div>

        <div class="quality-bar">
          <div class="q-item"><div class="q-dot" id="dotFocus"></div> وضوح</div>
          <div class="q-item"><div class="q-dot" id="dotLight"></div> إضاءة</div>
          <div class="q-item"><div class="q-dot" id="dotStable"></div> ثبات</div>
        </div>
      </div>
    </div>

    <div class="cam-controls">
      <button class="btn-capture" id="btnCapture">
        📷 التقاط
      </button>
      <label class="btn-upload">
        🖼 صورة
        <input type="file" id="fileInput" accept="image/*">
      </label>
    </div>
  </section>

  <!-- Manual Section -->
  <section class="manual-section">
    <div class="manual-label">⌨️ إدخال الكود يدوياً</div>
    <div class="manual-input-row">
      <input type="text" class="manual-input" id="manualCode" placeholder="H9TQ17ADFTMC..." autocomplete="off">
      <button class="btn-search" onclick="searchManual()">بحث</button>
    </div>
  </section>

  <!-- Loading State -->
  <div class="loading-card" id="loadingCard">
    <div class="spinner"></div>
    <div class="loading-text">جاري تحليل الشريحة...</div>
  </div>

  <!-- Error State -->
  <div class="error-card" id="errorCard"></div>

  <!-- Result Card -->
  <section class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-status">
        <div class="status-dot"></div>
        تم التحليل بنجاح
      </div>
      <div class="header-count" style="border:none" id="resultTime"></div>
    </div>

    <div class="result-body">
      <div id="typeBadge"></div>
      
      <div class="storage-display">
        <span class="storage-number" id="storageNum">64</span>
        <span class="storage-unit">GB</span>
      </div>

      <div class="ram-bga" id="ramBga">
        <div class="info-chip">💾 RAM <strong>4 GB</strong></div>
        <div class="info-chip">🏷 BGA <strong>221</strong></div>
      </div>

      <div class="detected-code" id="detectedCode">H9TQ17ADFTMCUR-KUM</div>
    </div>

    <div class="result-actions">
      <button class="btn-copy" onclick="copyCode()">📋 نسخ الكود</button>
      <button class="btn-next" onclick="nextPhoto()">✅ التالي</button>
    </div>
  </section>
</main>

<div class="toast" id="toast">تم نسخ الكود!</div>

<script>
// ═══════════════════════════════════════
// DATABASE
// ═══════════════════════════════════════
const IC_DATABASE = {
  // Samsung
  "KMRH60014M": { storage: "64", ram: "4", type: "عادي" },
  "KMQE60013M": { storage: "16", ram: "2", type: "عادي" },
  "KMRX60014M": { storage: "32", ram: "2", type: "عادي" },
  "KMRC10014M": { storage: "32", ram: "3", type: "عادي" },
  "KMR310001M": { storage: "16", ram: "2", type: "عادي" },
  "KMV3W000LM": { storage: "16", ram: "2", type: "عادي" },
  "KMV3U000LM": { storage: "16", ram: "2", type: "عادي" },
  "KMDH6001DA": { storage: "64", ram: "4", type: "عادي" },
  "KMDV6001DA": { storage: "32", ram: "3", type: "عادي" },
  "KMGD6001BM": { storage: "16", ram: "2", type: "عادي" },
  "KMFN60012M": { storage: "8", ram: "1", type: "عادي" },
  
  // SKhynix
  "H9TQ17ADFTMC": { storage: "16", ram: "2", type: "عادي" },
  "H9TQ64A8GTMC": { storage: "8", ram: "1", type: "عادي" },
  "H9TQ18ABJTMC": { storage: "16", ram: "2", type: "عادي" },
  "H9TQ26ADFTBC": { storage: "32", ram: "2", type: "عادي" },
  "H9TQ52ACLTMC": { storage: "64", ram: "4", type: "عادي" },
  "H9TQ27ADFTMC": { storage: "32", ram: "3", type: "عادي" },
  "H26M52103FGR": { storage: "16", type: "عادي" },
  "H26M64103EMR": { storage: "32", type: "عادي" },
  
  // Micron
  "MT29PZZZ4D4BKE": { storage: "4", ram: "512MB", type: "عادي" },
  "MT29PZZZ8D4BKE": { storage: "8", ram: "1", type: "عادي" },
  
  // Kingston
  "EMMC16G-W525": { storage: "16", type: "عادي" },
  "EMMC32G-W525": { storage: "32", type: "عادي" }
};

// ═══════════════════════════════════════
// CAMERA LOGIC
// ═══════════════════════════════════════
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const btnCapture = document.getElementById('btnCapture');
const fileInput = document.getElementById('fileInput');
let stream = null;
let isAnalyzing = false;
let sessionCount = 0;
let currentCode = '';

const autoCapture = {
  active: false,
  progress: 0,
  stableFrames: 0,
  lastBrightness: 0
};

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', focusMode: 'continuous', whiteBalance: 'continuous' }
    });
    video.srcObject = stream;
    requestAnimationFrame(processFrame);
  } catch (err) {
    showError("لا يمكن الوصول للكاميرا!\nاستخدم رفع صورة");
  }
}

function processFrame() {
  if (!stream || isAnalyzing) {
    requestAnimationFrame(processFrame);
    return;
  }

  // Simulate analysis of focus/light/stability
  const brightness = 70 + Math.random() * 20; // Simulated
  const focus = 80 + Math.random() * 15;      // Simulated
  const stability = 90 + Math.random() * 10;  // Simulated

  updateDots(focus, brightness, stability);
  
  // Auto capture logic
  if (focus > 85 && brightness > 60 && stability > 95) {
    autoCapture.stableFrames++;
    if (autoCapture.stableFrames > 20) {
      startCountdown();
    }
  } else {
    autoCapture.stableFrames = 0;
    hideCountdown();
  }

  requestAnimationFrame(processFrame);
}

function updateDots(f, b, s) {
  document.getElementById('dotFocus').className = 'q-dot ' + (f > 80 ? 'good' : 'warn');
  document.getElementById('dotLight').className = 'q-dot ' + (b > 50 ? 'good' : 'warn');
  document.getElementById('dotStable').className = 'q-dot ' + (s > 90 ? 'good' : 'warn');
}

function startCountdown() {
  const ring = document.getElementById('captureRing');
  const text = document.getElementById('ringText');
  ring.classList.add('visible');
  
  autoCapture.progress += 2;
  const offset = 126 - (autoCapture.progress / 100) * 126;
  ring.querySelector('circle').style.strokeDashoffset = offset;
  
  const count = Math.ceil((100 - autoCapture.progress) / 33);
  text.textContent = count > 0 ? count : '📸';

  if (autoCapture.progress >= 100) {
    capture();
    autoCapture.progress = 0;
  }
}

function hideCountdown() {
  document.getElementById('captureRing').classList.remove('visible');
  autoCapture.progress = 0;
}

btnCapture.addEventListener('click', capture);
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => analyzeImage(e.target.result.split(',')[1], e.target.result);
  reader.readAsDataURL(file);
});

function capture() {
  if (isAnalyzing) return;
  
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  
  const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
  analyzeImage(base64, canvas.toDataURL('image/jpeg'));
}

function searchInDB(code) {
  // Simple partial match
  for (let key in IC_DATABASE) {
    if (code.toUpperCase().includes(key.toUpperCase())) {
      return IC_DATABASE[key];
    }
  }
  
  // Advanced pattern matching
  const raw = code.toUpperCase();
  let storage = '';
  let ram = '';
  
  if (raw.includes('+')) {
    const parts = raw.split('+');
    const storageNum = parts[0].trim();
    let ramRaw = parts[1].replace('D2','').replace('D4','').replace('D5','').replace('正码','').replace('杂码','').replace('UMCP','').trim();
    
    // Display rules for 16
    if (storageNum === '16') {
      if (ramRaw === '1' || ramRaw === '1.5') ram = '1';
      else if (ramRaw === '2' || ramRaw === '3') ram = '2';
      else ram = ramRaw;
    } else {
      ram = ramRaw;
    }
    storage = storageNum;
  } else {
    storage = raw;
  }
  
  return { storage, ram };
}

// ANALYZE WITH CLAUDE API
// ═══════════════════════════════════════
async function analyzeImage(base64, previewSrc) {
  if (isAnalyzing) return;
  isAnalyzing = true;

  showLoading(true);
  showResult(false);
  showError(false);

  if (previewSrc) {
    const img = document.getElementById('imgPreview');
    img.src = previewSrc;
    img.classList.add('show');
  }

  const systemPrompt = `أنت خبير في قراءة شرائح IC للموبايل.

قواعد قراءة الكود:
- SKhynix: السطر الثاني
- Samsung/SEC: السطر الثالث
- SanDisk TAIWAN: السطر الثاني
- SanDisk CHINA: السطر الثالث
- Kingston عادي: السطر الرابع من اليسار
- Kingston زجاجي: السطر الرابع من المنتصف
- YMEC: السطر الأخير، C6=32GB, C7=64GB, C8=128GB
- Toshiba THGB: رقم بعد G (7=16GB, 8=32GB, 9=64GB)

تعرف على شكل البورد:
- لو البورد شكله طويل رفيع أزرق بتصميم Samsung = samsung_slim
- لو البورد شكله مربع عريض أزرق بتصميم Samsung = samsung_wide
- لو IC عريض مع كود Micron D9xxx = ram_only

رد بـ JSON فقط:
{"code": "الكود", "company": "الشركة", "board_type": "normal/samsung_slim/samsung_wide/ram_only"}

إذا مش واضح: {"code": "", "company": "", "board_type": "normal"}`;

  try {
    // تم تعديل الرابط ليعمل مع الـ Backend الخاص بنا لتجنب خطأ CORS
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20240620', // استخدام الموديل الصحيح
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{
          role: 'user',
          content: [{
            type: 'image',
            source: { type: 'base64', media_type: 'image/jpeg', data: base64 }
          }, {
            type: 'text',
            text: 'اقرأ الكود على شريحة IC في هذه الصورة وأرجع JSON فقط'
          }]
        }]
      })
    });

    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || '';
    
    let parsed;
    try {
      const clean = text.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(clean);
    } catch { parsed = { code: '', company: '' }; }

    const detectedCode = parsed.code || '';
    currentCode = detectedCode;

    if (!detectedCode) {
      showLoading(false);
      showError('❌ لم يتم التعرف على الكود\nجرب تصوير الشريحة من زاوية أخرى أو أدخل الكود يدوياً');
      isAnalyzing = false;
      return;
    }

    // Search in DB
    const found = searchInDB(detectedCode);
    
    showLoading(false);
    displayResult(detectedCode, found, parsed.company);
    sessionCount++;
    document.getElementById('sessionCount').textContent = sessionCount;

  } catch(e) {
    showLoading(false);
    showError('⚠️ خطأ في الاتصال بالخادم\n' + e.message);
  }

  isAnalyzing = false;
}

function searchManual() {
  const code = document.getElementById('manualCode').value.trim();
  if (!code) return;
  currentCode = code;
  
  const found = searchInDB(code);
  showResult(false);
  showError(false);
  displayResult(code, found, '');
  sessionCount++;
  document.getElementById('sessionCount').textContent = sessionCount;
}

function handleSpecialist() {
  // متخصص يفرز - نعرض النتيجة لو موجودة
  const code = document.getElementById('detectedCode').textContent;
  const found = searchInDB(code);
  if (found) {
    document.getElementById('storageNum').textContent = found.storage || '—';
    document.getElementById('ramBga').innerHTML = `<div class="type-badge glass">🔵 زجاجي</div>`;
  }
}

function displayResult(code, found, company) {
  document.getElementById('detectedCode').textContent = code;
  document.getElementById('resultTime').textContent = new Date().toLocaleTimeString('ar');

  if (found) {
    const storage = found.storage || (found.capacity ? found.capacity.split('+')[0] : '?');
    const isGlass = found.type === 'زجاجي';

    document.getElementById('typeBadge').innerHTML = 
      `<div class="type-badge ${isGlass ? 'glass' : 'normal'}">${isGlass ? '🔵 زجاجي' : '⚪ عادي'}</div>`;

    document.getElementById('storageNum').textContent = storage;

    let ramHtml = '';
    if (found.type === 'عادي' && found.capacity && found.capacity.includes('+')) {
      const parts = found.capacity.split('+');
      let ramRaw = parts[1].replace(/D[0-9]|正码|杂码|UMCP/g,'').trim();
      const storageNum = parts[0].trim();
      let ramDisplay = ramRaw;
      if (storageNum === '16') {
        if (ramRaw === '1' || ramRaw === '1.5') ramDisplay = '1';
        else if (ramRaw === '2' || ramRaw === '3') ramDisplay = '2';
      }
      if (ramDisplay) ramHtml = `<div class="info-chip">💾 RAM <strong>${ramDisplay} GB</strong></div>`;
    }
    document.getElementById('ramBga').innerHTML = ramHtml;

  } else {
    document.getElementById('typeBadge').innerHTML = '<div class="type-badge normal">⚠️ كود جديد - تم الحفظ</div>';
    document.getElementById('storageNum').textContent = '?';
    document.getElementById('ramBga').innerHTML = 
      `<div class="info-chip" style="color:var(--accent2)">📋 هيوصلك الكود عشان تعرّفهوله</div>`;
  }

  showResult(true);
}

function showLoading(show) {
  document.getElementById('loadingCard').classList.toggle('show', show);
}

function showResult(show) {
  document.getElementById('resultCard').classList.toggle('show', show);
}

function showError(msg) {
  const el = document.getElementById('errorCard');
  if (msg) { el.textContent = msg; el.classList.add('show'); }
  else { el.classList.remove('show'); }
}

function copyCode() {
  navigator.clipboard.writeText(currentCode).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

function nextPhoto() {
  showResult(false);
  showError(false);
  document.getElementById('imgPreview').classList.remove('show');
  document.getElementById('manualCode').value = '';
  autoCapture.progress = 0;
  isAnalyzing = false;
}
