<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مصنّف الذاكرة - النسخة المدفوعة (PRO)</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #0a0a0f; --card: #12121a; --border: #1e1e2e; --accent: #00d4ff; --accent2: #ff6b35; --glass: rgba(255,255,255,0.04); --text: #e8e8f0; --muted: #6b6b8a; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .header { background: linear-gradient(135deg, #0d0d1a 0%, #12121f 100%); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-logo { font-size: 20px; font-weight: 900; background: linear-gradient(135deg, var(--accent), #7b6cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .main { padding: 16px; max-width: 480px; margin: 0 auto; }
  .camera-section { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 16px; position: relative; }
  .camera-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; overflow: hidden; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #canvas { display: none; }
  .btn-capture { flex: 1; background: linear-gradient(135deg, var(--accent), #7b6cff); border: none; border-radius: 12px; color: #fff; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700; padding: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-upload { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Cairo', sans-serif; font-size: 13px; padding: 13px 16px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 16px; display: none; padding: 20px; text-align: center; }
  .result-card.show { display: block; animation: slideUp 0.3s ease; }
  .storage-number { font-size: 72px; font-weight: 900; background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .detected-code { margin-top: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-family: monospace; font-size: 13px; color: #00ff88; direction: ltr; text-align: left; }
  .loading-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; text-align: center; margin-bottom: 16px; display: none; }
  .loading-card.show { display: block; }
  .loading-spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .img-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: 12px; margin-bottom: 12px; display: none; }
  .img-preview.show { display: block; }
</style>
</head>
<body>
<div class="header"><div class="header-logo">البحراوي | لتصنيف الذواكر ⚡ (PRO)</div></div>
<div class="main">
  <div class="camera-section">
    <div class="camera-wrapper"><video id="video" autoplay playsinline muted></video><canvas id="canvas"></canvas></div>
    <div style="display:flex;gap:6px;padding:10px;background:var(--card)">
      <button class="btn-capture" onclick="captureManual()">📷 تحليل الشريحة</button>
      <button class="btn-upload" onclick="toggleCamera()">📷 تشغيل الكاميرا</button>
      <label class="btn-upload" style="cursor:pointer">🖼 صورة <input type="file" accept="image/*" style="display:none" onchange="uploadImage(event)"></label>
    </div>
  </div>
  <div class="loading-card" id="loadingCard"><div class="loading-spinner"></div><div class="loading-text">جاري التحليل عبر السيرفر (Gemini 1.5 Pro)...</div></div>
  <div class="result-card" id="resultCard">
    <img class="img-preview" id="imgPreview">
    <div style="font-size:24px;font-weight:700;color:var(--accent)">النتيجة:</div>
    <div class="storage-display"><span class="storage-number" id="storageNum">--</span><span style="font-size:28px;color:var(--muted)">GB</span></div>
    <div id="ramInfo" style="margin-bottom:10px;font-weight:700">RAM: --</div>
    <div class="detected-code" id="detectedCode"></div>
    <button class="btn-capture" style="margin-top:15px;background:var(--accent2)" onclick="nextPhoto()">التالية ←</button>
  </div>
</div>
<script>
let stream = null; const video = document.getElementById('video'); const canvas = document.getElementById('canvas');
async function toggleCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; video.srcObject = null; return; }
    try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); video.srcObject = stream; } catch (e) { alert("فشل تشغيل الكاميرا"); }
}
async function captureManual() {
    if (!stream) { alert("يرجى تشغيل الكاميرا أولاً"); return; }
    const ctx = canvas.getContext('2d'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0); const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
    analyzeImage(base64);
}
async function uploadImage(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader(); reader.onload = (ev) => { analyzeImage(ev.target.result.split(',')[1]); }; reader.readAsDataURL(file);
}
async function analyzeImage(base64) {
    document.getElementById('loadingCard').classList.add('show');
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('imgPreview').src = 'data:image/jpeg;base64,' + base64;
    document.getElementById('imgPreview').classList.add('show');
    try {
        const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ imageBase64: base64 })
        });
        const result = await res.json();
        if (result.error) throw new Error(result.error);
        document.getElementById('storageNum').innerText = result.storage || '--';
        document.getElementById('ramInfo').innerText = `RAM: ${result.ram || '--'} | Type: ${result.type || '--'}`;
        document.getElementById('detectedCode').innerText = result.code || 'غير معروف';
        document.getElementById('resultCard').classList.add('show');
    } catch (e) { alert("خطأ: " + e.message); } finally { document.getElementById('loadingCard').classList.remove('show'); }
}
function nextPhoto() { document.getElementById('resultCard').classList.remove('show'); }
</script>
</body>
</html>
