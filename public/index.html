<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مصنّف الذاكرة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --glass: rgba(255,255,255,0.04);
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d0d1a 0%, #12121f 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    font-size: 20px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .header-count {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--muted);
  }

  .header-count span {
    color: var(--accent);
    font-weight: 700;
  }

  /* Main */
  .main { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* Camera Section */
  .camera-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
  }

  .camera-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas { display: none; }

  /* Overlay */
  .cam-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Target frame */
  .target-frame {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 65%;
    aspect-ratio: 1.2;
    border: 2px solid rgba(0,212,255,0.6);
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
  }

  .target-frame::before, .target-frame::after,
  .target-frame .c1, .target-frame .c2 {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--accent);
    border-style: solid;
  }
  .target-frame::before { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
  .target-frame::after  { top: -2px; left: -2px;  border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
  .target-frame .c1     { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }
  .target-frame .c2     { bottom: -2px; left: -2px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }

  /* Scan line */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 2s linear infinite;
    opacity: 0;
  }
  .scanning .scan-line { opacity: 1; }
  @keyframes scan {
    0% { top: 20%; }
    100% { top: 80%; }
  }

  /* Quality indicators */
  .quality-bar {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    padding: 10px 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .q-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
  }

  .q-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    transition: all 0.3s;
  }

  .q-dot.good { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  .q-dot.warn { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; }
  .q-dot.bad  { background: #ff4455; }

  /* Progress ring */
  .auto-capture-ring {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 48px;
    height: 48px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .auto-capture-ring.visible { opacity: 1; }

  .ring-svg circle {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 126;
    stroke-dashoffset: 126;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 0.1s;
  }

  .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
  }

  /* Camera controls */
  .cam-controls {
    padding: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-capture {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-capture:active { transform: scale(0.97); opacity: 0.9; }
  .btn-capture:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-upload {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    padding: 13px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  /* Manual input */
  .manual-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 16px;
  }

  .manual-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .manual-input-row {
    display: flex;
    gap: 8px;
  }

  .manual-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    direction: ltr;
    text-align: left;
    outline: none;
  }

  .manual-input:focus { border-color: var(--accent); }

  .btn-search {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #000;
    font-weight: 700;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
  }

  /* Result card */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    display: none;
  }

  .result-card.show { display: block; animation: slideUp 0.3s ease; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .result-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .result-body {
    padding: 24px 16px;
    text-align: center;
    position: relative;
  }

  /* Type badge */
  .type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .type-badge.normal {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
  }

  .type-badge.glass {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--accent2);
  }

  /* Storage display */
  .storage-display {
    margin: 8px 0;
  }

  .storage-number {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -3px;
  }

  .storage-unit {
    font-size: 28px;
    font-weight: 700;
    color: var(--muted);
    margin-right: 4px;
  }

  .ram-bga {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
  }

  .info-chip {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .info-chip strong { color: var(--text); }

  /* Detected code */
  .detected-code {
    margin-top: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 13px;
    color: #00ff88;
    direction: ltr;
    text-align: left;
    word-break: break-all;
  }

  /* Action buttons */
  .result-actions {
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
  }

  .btn-copy {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-copy:active { background: rgba(0,212,255,0.1); border-color: var(--accent); }

  .btn-next {
    flex: 1;
    background: linear-gradient(135deg, var(--accent2), #ff3366);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-next:active { transform: scale(0.97); }

  /* Loading state */
  .loading-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    text-align: center;
    display: none;
  }

  .loading-card.show { display: block; }

  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 15px;
    color: var(--muted);
  }

  /* Error */
  .error-card {
    background: rgba(255,50,50,0.08);
    border: 1px solid rgba(255,50,50,0.2);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #ff8888;
    display: none;
    text-align: center;
  }

  .error-card.show { display: block; }

  /* Session counter */
  .session-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .session-label { font-size: 12px; color: var(--muted); }
  .session-num {
    font-size: 22px;
    font-weight: 900;
    color: var(--accent);
  }

  /* API Key Screen */
  .api-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .api-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
  }

  .api-title {
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .api-desc {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .api-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: monospace;
    font-size: 13px;
    padding: 12px;
    direction: ltr;
    outline: none;
    margin-bottom: 12px;
  }

  .api-input:focus { border-color: var(--accent); }

  .btn-api {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #7b6cff);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 13px;
    cursor: pointer;
  }

  .api-note {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 12px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #00ff88;
    color: #000;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 30px;
    font-size: 14px;
    transition: transform 0.3s;
    z-index: 999;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Image preview */
  .img-preview {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
    border-radius: 12px;
    margin-bottom: 12px;
    display: none;
  }
  .img-preview.show { display: block; }

  /* Not found */
  .not-found {
    color: var(--accent2);
    font-size: 16px;
    font-weight: 700;
    margin: 8px 0;
  }
</style>
</head>
<body>

<!-- API Key on server - no screen needed -->

<div class="header">
  <div class="header-logo">البحراوي | لتصنيف الذواكر ⚡</div>
  <div class="header-count">الجلسة: <span id="sessionCount">0</span> قطعة</div>
</div>

<div class="main">

  <!-- Camera -->
  <div class="camera-section">
    <div class="camera-wrapper" id="cameraWrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="cam-overlay" id="overlay">
        <div class="target-frame" id="targetFrame">
          <div class="c1"></div>
          <div class="c2"></div>
        </div>
        <div class="scan-line"></div>
        <div class="auto-capture-ring" id="captureRing">
          <svg class="ring-svg" viewBox="0 0 48 48" width="48" height="48">
            <circle cx="24" cy="24" r="20" id="ringCircle"/>
          </svg>
          <div class="ring-text" id="ringText">0%</div>
        </div>
      </div>
      <div class="quality-bar">
        <div class="q-item"><div class="q-dot" id="qSharp"></div> حدة</div>
        <div class="q-item"><div class="q-dot" id="qStable"></div> ثبات</div>
        <div class="q-item"><div class="q-dot" id="qLight"></div> إضاءة</div>
        <div class="q-item" style="margin-right:auto;font-size:10px;color:var(--muted)" id="autoMsg">وجّه الكاميرا</div>
      </div>
    </div>
    <div class="cam-controls">
      <button class="btn-capture" id="btnCapture" onclick="captureManual()">
        📷 التقاط
      </button>
      <label class="btn-upload">
        🖼 صورة
        <input type="file" accept="image/*" style="display:none" onchange="uploadImage(event)">
      </label>
    </div>
    <div class="cam-controls" style="margin-top:8px;gap:8px">
      <button class="btn-upload" id="btnCamToggle" onclick="toggleCamera()" style="flex:1">
        📷 تشغيل الكاميرا
      </button>
      <button class="btn-upload" id="btnFlash" onclick="toggleFlash()" style="flex:0.5">
        🔦
      </button>

    </div>
  </div>

  <!-- Manual input -->
  <div class="manual-section">
    <div class="manual-label">⌨️ إدخال الكود يدوياً</div>
    <div class="manual-input-row">
      <input class="manual-input" id="manualCode" placeholder="H9TQ17ADFTMC..." 
             onkeypress="if(event.key==='Enter') searchManual()">
      <button class="btn-search" onclick="searchManual()">بحث</button>
      <button class="btn-search" style="background:#2a2a3a;min-width:60px" onclick="navigator.clipboard.writeText(document.getElementById('manualCode').value)">نسخ</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-card" id="loadingCard">
    <div class="loading-spinner"></div>
    <div class="loading-text">جاري قراءة الشريحة...</div>
  </div>

  <!-- Error -->
  <div class="error-card" id="errorCard"></div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-status">
        <div class="status-dot"></div>
        تم التصنيف
      </div>
      <div style="font-size:12px;color:var(--muted)" id="resultTime"></div>
    </div>
    <div class="result-body">
      <img class="img-preview" id="imgPreview">
      <div id="typeBadge"></div>
      <div class="storage-display">
        <span class="storage-number" id="storageNum">--</span>
        <span class="storage-unit">GB</span>
      </div>
      <div class="ram-bga" id="ramBga"></div>
      <div class="detected-code" id="detectedCode"></div>
    </div>
    <div class="result-actions">
      <button class="btn-copy" onclick="copyCode()">📋 نسخ الكود</button>
      <button class="btn-next" onclick="nextPhoto()">📷 التالية ←</button>
    </div>
  </div>

</div>

<div class="toast" id="toast">تم النسخ ✓</div>

<script>
// ═══════════════════════════════════════

// ═══════════════════════════════════════
// CAMERA LOGIC
// ═══════════════════════════════════════
async function toggleCamera() {
    const video = document.getElementById('video');
    const btn = document.getElementById('btnCamToggle');
    
    if (isCameraOn) {
        stopCamera();
        btn.innerHTML = "📷 تشغيل الكاميرا";
        isCameraOn = false;
    } else {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', focusMode: 'continuous' }
            });
            video.srcObject = stream;
            btn.innerHTML = "🛑 إيقاف الكاميرا";
            isCameraOn = true;
            startAutoAnalysis();
        } catch (err) {
            showError("تعذر تشغيل الكاميرا: " + err.message);
        }
    }
}

function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
}

async function toggleFlash() {
    if (!stream) return;
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities();
    if (caps.torch) {
        const settings = track.getSettings();
        await track.applyConstraints({
            advanced: [{ torch: !settings.torch }]
        });
    } else {
        showToast("الفلاش غير مدعوم");
    }
}

// ═══════════════════════════════════════
// ANALYSIS LOGIC
// ═══════════════════════════════════════
async function analyze(imageData = null, code = null) {
    showLoading(true);
    hideError();
    
    try {
        const payload = {
            system: SYSTEM_PROMPT,
            image: imageData,
            code: code
        };

        const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || "فشل التحليل");

        // الـ Backend يرجع { result: "JSON string" }
        const result = JSON.parse(data.result);
        showResult(result, imageData);
        
    } catch (err) {
        showError("فشل التحليل: " + err.message);
    } finally {
        showLoading(false);
    }
}

function showResult(data, imageData) {
    document.getElementById('resultCard').classList.add('show');
    document.getElementById('storageNum').innerText = data.storage || "--";
    document.getElementById('ramBga').innerHTML = `
        <div class="info-chip">RAM: <strong>${data.ram || '--'} GB</strong></div>
        <div class="info-chip">BGA: <strong>${data.bga || '--'}</strong></div>
    `;
    document.getElementById('typeBadge').innerHTML = `
        <div class="type-badge normal">${data.type || 'UNKNOWN'}</div>
    `;
    document.getElementById('detectedCode').innerText = data.code || "لم يتم اكتشاف كود";
    
    if (imageData) {
        const img = document.getElementById('imgPreview');
        img.src = imageData;
        img.classList.add('show');
    }

    sessionCount++;
    document.getElementById('sessionCount').innerText = sessionCount;
    
    // التمرير للنتيجة
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
}

// ═══════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════
function captureManual() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    
    const base64 = canvas.toDataURL('image/jpeg', 0.8);
    analyze(base64);
}

function searchManual() {
    const code = document.getElementById('manualCode').value.trim();
    if (!code) return;
    
    // البحث أولاً في قاعدة البيانات المحلية
    let found = false;
    for (const [key, list] of Object.entries(NORMAL_DB)) {
        if (list.includes(code)) {
            const parts = key.split('+');
            showResult({
                storage: parts[0],
                ram: parts[1],
                bga: "DB",
                type: "NORMAL",
                code: code
            }, null);
            found = true;
            break;
        }
    }
    
    if (!found) {
        analyze(null, code);
    }
}

function uploadImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
        analyze(event.target.result);
    };
    reader.readAsDataURL(file);
}

function showLoading(show) {
    document.getElementById('loadingCard').className = show ? 'loading-card show' : 'loading-card';
    document.getElementById('btnCapture').disabled = show;
}

function showError(msg) {
    const err = document.getElementById('errorCard');
    err.innerText = msg;
    err.className = 'error-card show';
}

function hideError() {
    document.getElementById('errorCard').className = 'error-card';
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function copyCode() {
    const code = document.getElementById('detectedCode').innerText;
    navigator.clipboard.writeText(code);
    showToast("تم النسخ ✓");
}

function nextPhoto() {
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('manualCode').value = "";
    document.getElementById('imgPreview').classList.remove('show');
}

        document.getElementById('qSharp').className = 'q-dot good';
        document.getElementById('qStable').className = 'q-dot good';
        document.getElementById('qLight').className = 'q-dot good';
    }, 1000);
